<!DOCTYPE html>
<html lang="en" class="bg-base-200">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- Geist Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind + DasiyUI CDN link -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />


    <!-- CSS file connection -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>

    <section class="min-h-screen flex justify-center items-center">

        <!-- login from container -->
        <div class="w-[450px] bg-white p-8 rounded-xl shadow-md">

            <!-- from content -->
            <div class="text-center mb-5">
                <img class="mx-auto w-14 mb-4" src="./assets/github-logo.png">
                <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
                <p class="text-gray-500">Sign in to manage your issues</p>
            </div>

            <!-- login from input filed -->
            <label class="label mb-1">Username</label>
            <input id="input-username" type="text" class="input w-full" placeholder="Enter Username" />

            <p class="text-blue-500 text-sm mt-1">Default: admin</p>

            <label class="label mt-4 mb-1">Password</label>
            <input id="input-password" type="password" class="input w-full"
                placeholder="Enter Password" />

            <p class="text-blue-500 text-sm mt-1">Default: admin123</p>

            <button id="login-btn" class="btn btn-primary mt-6 w-full">Sign In</button>

            <!-- daisy Ui divider line -->
            <div class="flex w-full flex-col">
                <div class="divider">OR</div>
                <p class="text-center text-sm py-2">Demo Credentials:</p>
                <div class="card bg-base-300 rounded-box p-5 items-center">
                    <p class="text-sm"><span class="font-bold">Username:</span> admin</p>
                    <p class="text-sm"><span class="font-bold">Password:</span> admin123</p>
                </div>
            </div>
        </div>
    </section>


    <script src="script/login.js"></script>
</body>

</html>
